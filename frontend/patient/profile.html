<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — MediCare</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout" id="app">
  <div class="loading-container"><div class="loading-spinner"></div></div>
</div>
<script src="../js/main.js"></script>
<script src="../js/sidebar.js"></script>
<script>
async function init() {
  const user = requireAuth("patient");
  if (!user) return;
  const app = document.getElementById("app");
  app.innerHTML = renderPatientSidebar(user) + `
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">My Profile</div>
          <div class="topbar-sub">Manage your personal information</div>
        </div>
      </div>
      <div class="page-content">
        <div class="profile-header">
          <div class="profile-avatar-lg">${getInitials(user.name)}</div>
          <div>
            <div class="profile-info-name">${user.name}</div>
            <div class="profile-info-role">Patient</div>
            <div class="profile-info-email">${user.email}</div>
          </div>
        </div>
        <div class="card" style="max-width: 600px;">
          <div class="card-header">
            <div class="card-title">Edit Profile</div>
          </div>
          <div id="alert" class="alert hidden"></div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="name" class="form-control" value="${user.name}">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="phone" class="form-control" value="${user.phone || ''}">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Age</label>
              <input type="number" id="age" class="form-control" value="${user.age || ''}" min="1" max="120">
            </div>
            <div class="form-group">
              <label class="form-label">Blood Group</label>
              <select id="blood_group" class="form-select">
                <option value="">Select</option>
                ${["A+","A-","B+","B-","O+","O-","AB+","AB-"].map(bg => `<option ${user.blood_group === bg ? "selected" : ""}>${bg}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" id="address" class="form-control" value="${user.address || ''}">
          </div>
          <button class="btn btn-primary" onclick="updateProfile('${user.email}')" id="saveBtn">Save Changes</button>
        </div>
      </div>
    </div>
  `;
  setActiveSidebarLink();
}

async function updateProfile(email) {
  hideAlert("alert");
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const age = document.getElementById("age").value;
  const blood_group = document.getElementById("blood_group").value;
  const address = document.getElementById("address").value.trim();
  const btn = document.getElementById("saveBtn");

  if (!name) { showAlert("alert", "Name is required."); return; }

  btn.disabled = true; btn.textContent = "Saving...";
  const result = await apiPut(`/profile/${email}`, { name, phone, age, blood_group, address });
  btn.disabled = false; btn.textContent = "Save Changes";

  if (result.ok) {
    const user = getUser();
    user.name = name; user.phone = phone; user.age = age;
    user.blood_group = blood_group; user.address = address;
    setUser(user);
    showToast("Profile updated successfully!", "success");
  } else {
    showAlert("alert", result.data.error || "Update failed.");
  }
}

init();
</script>
</body>
</html>
