<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — MediCare</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout" id="app">
  <div class="loading-container"><div class="loading-spinner"></div></div>
</div>
<script src="../js/main.js"></script>
<script src="../js/sidebar.js"></script>
<script>
async function init() {
  const user = requireAuth("admin");
  if (!user) return;

  const app = document.getElementById("app");
  app.innerHTML = renderAdminSidebar(user) + `
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Admin Overview</div>
          <div class="topbar-sub">Hospital Management System</div>
        </div>
        <div class="topbar-right">
          <a href="add-doctor.html" class="btn btn-secondary btn-sm">+ Add Doctor</a>
        </div>
      </div>
      <div class="page-content">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon blue">👥</div><div class="stat-info"><div class="stat-value" id="s-patients">—</div><div class="stat-label">Total Patients</div></div></div>
          <div class="stat-card"><div class="stat-icon green">👨‍⚕️</div><div class="stat-info"><div class="stat-value" id="s-doctors">—</div><div class="stat-label">Total Doctors</div></div></div>
          <div class="stat-card"><div class="stat-icon blue">📋</div><div class="stat-info"><div class="stat-value" id="s-appts">—</div><div class="stat-label">Total Appointments</div></div></div>
          <div class="stat-card"><div class="stat-icon orange">⏳</div><div class="stat-info"><div class="stat-value" id="s-pending">—</div><div class="stat-label">Pending</div></div></div>
          <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="stat-value" id="s-approved">—</div><div class="stat-label">Approved</div></div></div>
          <div class="stat-card"><div class="stat-icon blue">🏁</div><div class="stat-info"><div class="stat-value" id="s-completed">—</div><div class="stat-label">Completed</div></div></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="card">
            <div class="card-header">
              <div><div class="card-title">Recent Appointments</div></div>
              <a href="appointments.html" class="btn btn-ghost btn-sm">View All →</a>
            </div>
            <div id="recent-appts">
              <div class="loading-container"><div class="loading-spinner"></div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div><div class="card-title">Quick Links</div></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;">
              <a href="appointments.html" class="btn btn-outline" style="justify-content:flex-start;">📋 Manage Appointments</a>
              <a href="users.html" class="btn btn-outline" style="justify-content:flex-start;">👥 Manage Users</a>
              <a href="add-doctor.html" class="btn btn-secondary" style="justify-content:flex-start;">👨‍⚕️ Add New Doctor</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  setActiveSidebarLink();
  await loadStats();
  await loadRecentAppts();
}

async function loadStats() {
  const result = await apiGet("/admin/stats");
  if (result.ok) {
    const d = result.data;
    document.getElementById("s-patients").textContent = d.total_patients;
    document.getElementById("s-doctors").textContent = d.total_doctors;
    document.getElementById("s-appts").textContent = d.total_appointments;
    document.getElementById("s-pending").textContent = d.pending;
    document.getElementById("s-approved").textContent = d.approved;
    document.getElementById("s-completed").textContent = d.completed;
  }
}

async function loadRecentAppts() {
  const result = await apiGet("/admin/appointments");
  const el = document.getElementById("recent-appts");
  if (!result.ok || !result.data.length) {
    el.innerHTML = `<div class="empty-state" style="padding:30px"><div>No appointments yet</div></div>`;
    return;
  }
  el.innerHTML = `<div class="appointment-list">` + result.data.slice(0, 5).map(a => `
    <div class="appointment-card status-${a.status.toLowerCase()}" style="padding: 12px 16px;">
      <div class="appt-avatar" style="width:36px;height:36px;font-size:13px;">${getInitials(a.patient_name)}</div>
      <div class="appt-info">
        <div class="appt-name" style="font-size:13.5px;">${a.patient_name} → Dr. ${a.doctor_name}</div>
        <div class="appt-sub">${formatDate(a.date)} • ${formatTime(a.time)}</div>
      </div>
      <div>${statusBadge(a.status)}</div>
    </div>
  `).join("") + `</div>`;
}

init();
</script>
</body>
</html>
