<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Doctor — Admin | MediCare</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout" id="app">
  <div class="loading-container"><div class="loading-spinner"></div></div>
</div>
<script src="../js/main.js"></script>
<script src="../js/sidebar.js"></script>
<script>
async function init() {
  const user = requireAuth("admin");
  if (!user) return;
  const app = document.getElementById("app");
  app.innerHTML = renderAdminSidebar(user) + `
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Add New Doctor</div>
          <div class="topbar-sub">Register a new doctor to the system</div>
        </div>
      </div>
      <div class="page-content">
        <div class="card" style="max-width: 600px;">
          <div class="card-header"><div class="card-title">Doctor Information</div></div>
          <div id="alert" class="alert hidden"></div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input type="text" id="name" class="form-control" placeholder="Dr. John Smith">
            </div>
            <div class="form-group">
              <label class="form-label">Email *</label>
              <input type="email" id="email" class="form-control" placeholder="doctor@hospital.com">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Password *</label>
              <input type="password" id="password" class="form-control" placeholder="Min. 6 characters">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Specialization *</label>
              <select id="specialization" class="form-select">
                <option value="">Select specialization</option>
                <option>General Physician</option>
                <option>Cardiologist</option>
                <option>Dermatologist</option>
                <option>Neurologist</option>
                <option>Orthopedist</option>
                <option>Pediatrician</option>
                <option>Psychiatrist</option>
                <option>Gynecologist</option>
                <option>Ophthalmologist</option>
                <option>ENT Specialist</option>
                <option>Dentist</option>
                <option>Urologist</option>
                <option>Oncologist</option>
                <option>Radiologist</option>
                <option>Endocrinologist</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Department</label>
              <input type="text" id="department" class="form-control" placeholder="e.g., Cardiology">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Years of Experience</label>
            <input type="number" id="experience" class="form-control" placeholder="e.g., 10" min="0" max="60">
          </div>

          <div style="display:flex;gap:12px;">
            <button class="btn btn-secondary btn-lg" onclick="addDoctor()" id="addBtn" style="flex:1;">
              👨‍⚕️ Register Doctor
            </button>
            <a href="users.html" class="btn btn-ghost btn-lg">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  `;
  setActiveSidebarLink();
}

async function addDoctor() {
  hideAlert("alert");
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value.trim();
  const specialization = document.getElementById("specialization").value;
  const department = document.getElementById("department").value.trim();
  const experience = document.getElementById("experience").value;
  const btn = document.getElementById("addBtn");

  if (!name || !email || !password || !specialization) {
    showAlert("alert", "Name, email, password, and specialization are required.");
    return;
  }

  btn.disabled = true; btn.textContent = "Registering...";

  const result = await apiPost("/register-doctor", {
    name, email, password, phone, specialization, department, experience
  });

  btn.disabled = false; btn.textContent = "👨‍⚕️ Register Doctor";

  if (result.ok) {
    showToast("Doctor registered successfully!", "success");
    setTimeout(() => window.location.href = "users.html", 1500);
  } else {
    showAlert("alert", result.data.error || "Registration failed.");
  }
}

init();
</script>
</body>
</html>
